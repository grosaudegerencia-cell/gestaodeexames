<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Agenda — Sistema GRO Saúde</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<script src="config.js"></script>
<script src="auth.js"></script>
<script src="db.js"></script>
<script src="data.js"></script>
<link rel="stylesheet" href="style.css"/>
<link rel="stylesheet" href="sistema.css"/>
</head>
<body class="sys-body">

<div id="gro-header" data-page="agenda"></div>

<main class="sys-main">
  <!-- Barra de controle da agenda -->
  <div class="agenda-bar">
    <div class="agenda-nav">
      <button class="btn-nav" onclick="mudarDia(-1)" title="Dia anterior">‹</button>
      <input type="date" id="agendaData" onchange="renderAgenda()"/>
      <button class="btn-nav" onclick="mudarDia(1)" title="Próximo dia">›</button>
      <button class="btn-hoje" onclick="irHoje()">Hoje</button>
      <span class="agenda-dow" id="agendaDow"></span>
    </div>
    <div class="agenda-stats">
      <span class="ag-chip ag-chip-livre">Livres: <strong id="stLivres">—</strong></span>
      <span class="ag-chip ag-chip-ocup">Ocupadas: <strong id="stOcup">—</strong></span>
      <span class="ag-chip ag-chip-total">Total de vagas: <strong id="stTotal">—</strong></span>
      <button class="btn-cfg" onclick="abrirConfig()" title="Configurar horários">⚙ Horários</button>
    </div>
  </div>

  <!-- Grade de vagas (10 em 10 min) -->
  <div class="agenda-grid-card">
    <div class="agenda-grid-head">
      <span style="width:90px">Horário</span>
      <span style="flex:1">Paciente / Empresa</span>
      <span style="width:150px">Tipo de Exame</span>
      <span style="width:120px">Status</span>
      <span style="width:90px;text-align:center">Ação</span>
    </div>
    <div id="agendaGrid" class="agenda-grid"></div>
  </div>
</main>

<!-- MODAL de agendamento -->
<div class="modal-overlay" id="modalAg">
  <div class="modal-card">
    <div class="modal-head">
      <h3 id="modalTitle">Agendar vaga</h3>
      <button class="modal-x" onclick="fecharModal()">×</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="mId"/>
      <div class="mrow">
        <div class="mfield"><label>Data</label><input type="text" id="mData" readonly/></div>
        <div class="mfield"><label>Horário</label><input type="text" id="mHora" readonly/></div>
        <div class="mfield"><label>Status</label>
          <select id="mStatus">
            <option>Agendado</option><option>Confirmado</option><option>Realizado</option>
            <option>Faltou</option><option>Reagendado</option><option>Cancelado</option>
          </select>
        </div>
      </div>
      <div class="mrow">
        <div class="mfield grow"><label>Paciente / Colaborador *</label><input type="text" id="mPaciente" placeholder="Nome completo"/></div>
        <div class="mfield"><label>CPF</label><input type="text" id="mCpf" placeholder="000.000.000-00"/></div>
      </div>
      <div class="mrow">
        <div class="mfield grow"><label>Empresa *</label><input type="text" id="mEmpresa" list="empList" placeholder="Empresa"/>
          <datalist id="empList"></datalist></div>
        <div class="mfield"><label>Tipo de Exame *</label><select id="mTipo"></select></div>
      </div>
      <div class="mfield">
        <label>Procedimentos / Exames * <span class="mhint">(marque os que serão feitos)</span></label>
        <div id="mProcs" class="proc-checks"></div>
      </div>
      <div class="mrow">
        <div class="mfield grow"><label>Médico responsável</label><input type="text" id="mMedico" placeholder="Médico"/></div>
      </div>
      <div class="mfield"><label>Observações</label><textarea id="mObs" rows="2" placeholder="Observações"></textarea></div>
    </div>
    <div class="modal-foot">
      <button class="btn-danger" id="btnExcluir" onclick="excluirAg()" style="display:none">Excluir</button>
      <div style="flex:1"></div>
      <button class="btn-secondary" onclick="fecharModal()">Cancelar</button>
      <button class="btn-primary" onclick="salvarAg()">Salvar vaga</button>
    </div>
  </div>
</div>

<!-- MODAL config horários -->
<div class="modal-overlay" id="modalCfg">
  <div class="modal-card" style="max-width:440px">
    <div class="modal-head"><h3>Configurar horários da agenda</h3><button class="modal-x" onclick="fecharConfig()">×</button></div>
    <div class="modal-body">
      <div class="mrow">
        <div class="mfield"><label>Início</label><input type="time" id="cfgIni"/></div>
        <div class="mfield"><label>Fim</label><input type="time" id="cfgFim"/></div>
        <div class="mfield"><label>Intervalo (min)</label>
          <select id="cfgInt"><option value="5">5</option><option value="10" selected>10</option><option value="15">15</option><option value="20">20</option><option value="30">30</option></select>
        </div>
      </div>
      <div class="mrow">
        <div class="mfield"><label>Almoço início</label><input type="time" id="cfgAlmI"/></div>
        <div class="mfield"><label>Almoço fim</label><input type="time" id="cfgAlmF"/></div>
      </div>
      <p class="mhint">As vagas serão geradas automaticamente nesse intervalo (ex.: de 10 em 10 minutos).</p>
    </div>
    <div class="modal-foot">
      <div style="flex:1"></div>
      <button class="btn-secondary" onclick="fecharConfig()">Cancelar</button>
      <button class="btn-primary" onclick="salvarConfig()">Salvar</button>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script src="nav.js"></script>
<script>
const TIPO_CORES = {'ASO Admissional':'#16A94A','ASO Periódico':'#2980b9','ASO Demissional':'#e74c3c','ASO Retorno ao Trabalho':'#e67e22','ASO Mudança de Riscos':'#9b59b6','ASO Mudança de Função':'#8e44ad','Consulta Médica':'#1abc9c','Coleta Laboratorial':'#f39c12'};
const STATUS_CORES = {'Agendado':'#f39c12','Confirmado':'#2980b9','Realizado':'#16A94A','Faltou':'#e74c3c','Reagendado':'#9b59b6','Cancelado':'#7f8c8d'};

document.addEventListener('DOMContentLoaded', () => {
  if (!GRO_AUTH.requireLogin()) return;
  document.getElementById('agendaData').value = new Date().toISOString().split('T')[0];
  renderAgenda();
});

function dataAtual() { return document.getElementById('agendaData').value; }

function mudarDia(delta) {
  const d = new Date(dataAtual()+'T12:00');
  d.setDate(d.getDate()+delta);
  document.getElementById('agendaData').value = d.toISOString().split('T')[0];
  renderAgenda();
}
function irHoje() {
  document.getElementById('agendaData').value = new Date().toISOString().split('T')[0];
  renderAgenda();
}

// Agrupa registros do GRO_EXAMES (data.js) por empresa+paciente para uma data
function getExamesParaData(data) {
  if (typeof GRO_EXAMES === 'undefined') return [];
  const grupos = {};
  GRO_EXAMES.filter(r => r.data === data).forEach(r => {
    const key = `${r.empresa}|${r.paciente}`;
    if (!grupos[key]) grupos[key] = { paciente:r.paciente, empresa:r.empresa, tipo:r.tipo, status:r.status, procs:[] };
    if (r.descricao && !grupos[key].procs.includes(r.descricao)) grupos[key].procs.push(r.descricao);
  });
  return Object.values(grupos);
}

function renderAgenda() {
  const data = dataAtual();
  const d = new Date(data+'T12:00');
  const dow = d.toLocaleDateString('pt-BR', { weekday:'long', day:'2-digit', month:'long', year:'numeric' });
  document.getElementById('agendaDow').textContent = dow.charAt(0).toUpperCase()+dow.slice(1);

  const slots = GRO_DB.gerarSlots();

  // 1 — Registros salvos (localStorage) — precedência máxima
  const agLocal = GRO_DB.getPorData(data);
  const mapa = {};
  agLocal.forEach(a => mapa[a.hora] = a);

  // 2 — Registros históricos da planilha (data.js) para a mesma data
  const historico = getExamesParaData(data);
  const localKeys = new Set(agLocal.map(a => `${a.empresa}|${a.paciente}`));
  const semSlot = historico.filter(h => !localKeys.has(`${h.empresa}|${h.paciente}`));

  // Distribui registros históricos nos slots livres
  let histIdx = 0;
  slots.forEach(s => {
    if (!mapa[s.hora] && !s.almoco && histIdx < semSlot.length) {
      const h = semSlot[histIdx++];
      mapa[s.hora] = { ...h, hora:s.hora, data, procedimentos:h.procs, fromHistorico:true, id:null };
    }
  });

  const grid = document.getElementById('agendaGrid');
  grid.innerHTML = '';
  let ocupadas = 0;

  slots.forEach(s => {
    const a = mapa[s.hora];
    const row = document.createElement('div');

    if (s.almoco && !a) {
      row.className = 'ag-row ag-almoco';
      row.innerHTML = `<span class="ag-hora">${s.hora}</span><span class="ag-almoco-txt">— Intervalo / Almoço —</span>`;
      grid.appendChild(row); return;
    }

    if (a) {
      ocupadas++;
      const tc = TIPO_CORES[a.tipo] || '#777';
      const sc = STATUS_CORES[a.status] || '#777';
      const procs = (a.procedimentos||[]).join(', ');
      const isHist = !!a.fromHistorico;
      row.className = 'ag-row ag-ocupada' + (isHist ? ' ag-hist-row' : '');
      const pac = (a.paciente||'').replace(/'/g,"\\'");
      const emp = (a.empresa||'').replace(/'/g,"\\'");
      row.innerHTML = `
        <span class="ag-hora">${s.hora}</span>
        <span class="ag-pac">
          <strong>${a.paciente||'—'}</strong>
          <small>${a.empresa||''}${procs?' · '+procs:''}</small>
          ${isHist ? '<span class="ag-hist-tag">📋 Planilha</span>' : ''}
        </span>
        <span class="ag-tipo"><span class="ag-tag" style="background:${tc}">${a.tipo||'—'}</span></span>
        <span class="ag-status"><span class="ag-badge" style="background:${sc}1a;color:${sc}">●&nbsp;${a.status||'—'}</span></span>
        <span class="ag-acao">${
          isHist
            ? `<button class="btn-mini btn-mini-add" onclick="confirmarDaPlanilha('${s.hora}','${pac}','${emp}','${a.tipo||''}','${a.status||''}')">+ Confirmar</button>`
            : `<button class="btn-mini" onclick="editarAg('${a.id}')">Editar</button>`
        }</span>`;
    } else {
      row.className = 'ag-row ag-livre';
      row.innerHTML = `
        <span class="ag-hora">${s.hora}</span>
        <span class="ag-vaga">Vaga livre</span>
        <span></span><span></span>
        <span class="ag-acao"><button class="btn-mini btn-mini-add" onclick="novoAg('${s.hora}')">+ Agendar</button></span>`;
    }
    grid.appendChild(row);
  });

  const totalSlots = slots.filter(s => !s.almoco).length;
  document.getElementById('stLivres').textContent = Math.max(totalSlots - ocupadas, 0);
  document.getElementById('stOcup').textContent   = ocupadas;
  document.getElementById('stTotal').textContent  = totalSlots;
}

// Abre modal pré-preenchido com dados da planilha para o usuário confirmar/salvar
function confirmarDaPlanilha(hora, paciente, empresa, tipo, status) {
  const data = dataAtual();
  const hist = getExamesParaData(data).find(h => h.paciente === paciente && h.empresa === empresa);
  preencherSelectsModal();
  document.getElementById('modalTitle').textContent = 'Confirmar da Planilha';
  document.getElementById('mId').value       = '';
  document.getElementById('mData').value     = new Date(data+'T12:00').toLocaleDateString('pt-BR');
  document.getElementById('mHora').value     = hora;
  document.getElementById('mPaciente').value = paciente;
  document.getElementById('mEmpresa').value  = empresa;
  document.getElementById('mTipo').value     = tipo;
  document.getElementById('mStatus').value   = status || 'Agendado';
  document.getElementById('btnExcluir').style.display = 'none';
  document.getElementById('modalAg').dataset.hora = hora;
  if (hist && hist.procs.length) {
    setTimeout(() => {
      hist.procs.forEach(p => {
        const cb = document.querySelector(`#mProcs input[value="${CSS.escape(p)}"]`);
        if (cb) cb.checked = true;
      });
    }, 30);
  }
  document.getElementById('modalAg').classList.add('show');
}

// ---------- MODAL ----------
function preencherSelectsModal() {
  const selTipo = document.getElementById('mTipo');
  selTipo.innerHTML = GRO_DB.getTipos().map(t=>`<option>${t}</option>`).join('');
  const procs = GRO_DB.getProcedimentos();
  document.getElementById('mProcs').innerHTML = procs.map(p=>`
    <label class="proc-check"><input type="checkbox" value="${p.nome}"> ${p.nome}</label>`).join('');
  const dl = document.getElementById('empList');
  const empresas = [...new Set(GRO_DB.getAgendamentos().map(a=>a.empresa).filter(Boolean))].sort();
  dl.innerHTML = empresas.map(e=>`<option value="${e}">`).join('');
}

function novoAg(hora) {
  preencherSelectsModal();
  document.getElementById('modalTitle').textContent = 'Agendar vaga';
  document.getElementById('mId').value = '';
  document.getElementById('mData').value = new Date(dataAtual()+'T12:00').toLocaleDateString('pt-BR');
  document.getElementById('mHora').value = hora;
  ['mPaciente','mCpf','mEmpresa','mMedico','mObs'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('mStatus').value = 'Agendado';
  document.getElementById('btnExcluir').style.display = 'none';
  document.getElementById('modalAg').dataset.hora = hora;
  document.getElementById('modalAg').classList.add('show');
}

function editarAg(id) {
  const a = GRO_DB.getAgendamentos().find(x=>x.id===id);
  if (!a) return;
  preencherSelectsModal();
  document.getElementById('modalTitle').textContent = 'Editar agendamento';
  document.getElementById('mId').value = a.id;
  document.getElementById('mData').value = new Date(a.data+'T12:00').toLocaleDateString('pt-BR');
  document.getElementById('mHora').value = a.hora;
  document.getElementById('mPaciente').value = a.paciente||'';
  document.getElementById('mCpf').value = a.cpf||'';
  document.getElementById('mEmpresa').value = a.empresa||'';
  document.getElementById('mTipo').value = a.tipo||'';
  document.getElementById('mMedico').value = a.medico||'';
  document.getElementById('mObs').value = a.obs||'';
  document.getElementById('mStatus').value = a.status||'Agendado';
  (a.procedimentos||[]).forEach(p=>{
    const cb = document.querySelector(`#mProcs input[value="${CSS.escape(p)}"]`);
    if (cb) cb.checked = true;
  });
  document.getElementById('btnExcluir').style.display = 'inline-flex';
  document.getElementById('modalAg').dataset.hora = a.hora;
  document.getElementById('modalAg').classList.add('show');
}

function fecharModal(){ document.getElementById('modalAg').classList.remove('show'); }

function salvarAg() {
  const id = document.getElementById('mId').value;
  const paciente = document.getElementById('mPaciente').value.trim();
  const empresa  = document.getElementById('mEmpresa').value.trim();
  const tipo     = document.getElementById('mTipo').value;
  const procs    = [...document.querySelectorAll('#mProcs input:checked')].map(c=>c.value);
  if (!paciente || !empresa || !tipo) { toast('Preencha paciente, empresa e tipo.', 'error'); return; }
  if (!procs.length) { toast('Selecione ao menos um procedimento.', 'error'); return; }

  const reg = {
    data: dataAtual(),
    hora: document.getElementById('modalAg').dataset.hora,
    paciente, cpf: document.getElementById('mCpf').value.trim(),
    empresa, tipo, procedimentos: procs,
    medico: document.getElementById('mMedico').value.trim(),
    obs: document.getElementById('mObs').value.trim(),
    status: document.getElementById('mStatus').value,
  };
  if (id) { GRO_DB.updateAgendamento(id, reg); toast('Agendamento atualizado!', 'success'); }
  else    { GRO_DB.addAgendamento(reg);        toast('Vaga agendada com sucesso!', 'success'); }
  fecharModal(); renderAgenda();
}

function excluirAg() {
  const id = document.getElementById('mId').value;
  if (!id) return;
  if (!confirm('Excluir este agendamento?')) return;
  GRO_DB.removeAgendamento(id);
  toast('Agendamento excluído.', 'success');
  fecharModal(); renderAgenda();
}

// ---------- CONFIG ----------
function abrirConfig() {
  const c = GRO_DB.getConfigAgenda();
  document.getElementById('cfgIni').value = c.inicio;
  document.getElementById('cfgFim').value = c.fim;
  document.getElementById('cfgInt').value = String(c.intervalo);
  document.getElementById('cfgAlmI').value = c.almocoIni||'';
  document.getElementById('cfgAlmF').value = c.almocoFim||'';
  document.getElementById('modalCfg').classList.add('show');
}
function fecharConfig(){ document.getElementById('modalCfg').classList.remove('show'); }
function salvarConfig() {
  GRO_DB.setConfigAgenda({
    inicio: document.getElementById('cfgIni').value || '07:00',
    fim:    document.getElementById('cfgFim').value || '17:00',
    intervalo: parseInt(document.getElementById('cfgInt').value,10) || 10,
    almocoIni: document.getElementById('cfgAlmI').value,
    almocoFim: document.getElementById('cfgAlmF').value,
  });
  fecharConfig(); renderAgenda();
  toast('Horários atualizados!', 'success');
}

function toast(msg, tipo) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = `toast ${tipo} show`;
  setTimeout(()=>t.className=`toast ${tipo}`, 3000);
}
</script>
</body>
</html>
